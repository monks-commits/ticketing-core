<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Афіша</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg,#0b1a2a,#02070d);
      color:#fff;
    }

    h1{
      text-align:center;
      padding:30px 0 10px;
      color:#d4a84f;
      font-weight:600;
      letter-spacing:1px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
      padding:30px;
      max-width:1100px;
      margin:auto;
    }

    .card{
      background:#0f2236;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .poster{
      width:100%;
      height:360px;
      object-fit:cover;
      background:#222;
    }

    .card-body{
      padding:18px;
      text-align:center;
    }

    .title{
      font-size:18px;
      margin-bottom:8px;
    }

    .date{
      font-size:14px;
      opacity:0.8;
      margin-bottom:14px;
    }

    .btn{
      display:inline-block;
      padding:10px 18px;
      border-radius:8px;
      background:#d4a84f;
      color:#000;
      text-decoration:none;
      font-weight:600;
    }
  </style>
</head>
<body>

<h1>Афіша</h1>

<div id="afisha" class="grid"></div>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

// 🎭 загрузка сеансов
async function loadSeances(){

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?select=id,show,date,time,active&active=eq.true&order=date.asc`,
    {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await res.json();

  renderSeances(data);
}

// 🎨 рендер
function renderSeances(list){

  const container = document.getElementById("afisha");
  container.innerHTML = "";

  list.forEach(s => {

    const el = document.createElement("div");
    el.className = "card";

    // 👉 картинка по названию (если нет — заглушка)
    const img = `images/${(s.show || "default").toLowerCase().replaceAll(" ","-")}.jpg`;

    el.innerHTML = `
      <img class="poster" src="${img}" onerror="this.src='images/default.jpg'">

      <div class="card-body">
        <div class="title">${s.show || "Вистава"}</div>
        <div class="date">${s.date || ""} ${s.time || ""}</div>

        <a class="btn" href="hall.html?seance=${s.id}">
          Купити квитки
        </a>
      </div>
    `;

    container.appendChild(el);
  });
}

loadSeances();
</script>

</body>
</html>
