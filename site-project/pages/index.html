<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Афіша — Академія руху</title>

  <style>
    body{
      margin:0;
      background: linear-gradient(180deg, #0b1320 0%, #0e1a2b 100%);
      color:#e5e7eb;
      font-family: system-ui, Arial;
    }

    .page-title{
      text-align:center;
      font-size:34px;
      margin-top:30px;
      margin-bottom:10px;
      color:#d6a44c;
      letter-spacing:1px;
    }

    .shows-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, 240px);
justify-content:center;
      gap:28px;
      padding:40px;
      max-width:1200px;
      margin:auto;
    }

    .show-card{
      background: linear-gradient(145deg, #0f1c2e, #0a1422);
      border-radius:16px;
      overflow:hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: all .3s ease;
    }

    .show-card:hover{
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.8);
    }

    .show-card img{
  width:100%;
  height:auto;
  aspect-ratio: 2 / 3;
  object-fit:cover;
}

    .show-info{
      padding:20px;
      text-align:center;
    }

    .show-info h3{
      font-size:22px;
      margin-bottom:10px;
      color:#f3f4f6;
    }

    .show-info p{
      margin-bottom:18px;
      color:#9ca3af;
    }

    /* БРОНЗОВА КНОПКА */
    .btn{
      display:inline-block;
      padding:12px 22px;
      border-radius:10px;
      font-weight:600;
      text-decoration:none;
      color:#2b1a00;

      background: linear-gradient(145deg, #d6a44c, #b8822a);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.4),
        0 6px 15px rgba(0,0,0,0.5);

      transition: all .25s ease;
    }

    .btn:hover{
      background: linear-gradient(145deg, #e3b35c, #c99535);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<h1 class="page-title">Афіша</h1>

<div class="shows-grid">

  <!-- Сонечко -->
  <div class="show-card">
    <img src="images/sonechko.jpg">

    <div class="show-info">
      <h3>Сонечко</h3>
      <p>11 квітня, 12:00</p>

      <a href="hall.html?seance=sonechko-2026-04-11-12-00" class="btn">
        Купити квитки
      </a>
    </div>
  </div>

  <!-- Залишайся -->
  <div class="show-card">
    <img src="images/zalyshaysya.jpg">

    <div class="show-info">
      <h3>Залишайся</h3>
      <p>18 квітня, 12:00</p>

      <a href="hall.html?seance=zalyshaysya-2026-04-18-12-00" class="btn">
        Купити квитки
      </a>
    </div>
  </div>

</div>

</body>
</html>
