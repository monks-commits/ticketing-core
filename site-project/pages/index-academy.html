<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Квитки онлайн — Академія Руху</title>

<style>
  :root{
    --bg:#07111c;
    --bg-2:#0b1a2a;
    --card:#10263d;
    --card-2:#122d47;
    --text:#ffffff;
    --muted:#b8c4d6;
    --line:rgba(255,255,255,.08);
    --accent:#d4af37;
    --accent-hover:#c49d21;
    --shadow:0 18px 40px rgba(0,0,0,.28);
    --radius-xl:28px;
    --radius-lg:20px;
    --radius-md:14px;
  }

  *{box-sizing:border-box}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(38,78,126,.22), transparent 36%),
      linear-gradient(180deg, #07111c 0%, #0a1726 100%);
    color:var(--text);
  }

  .page{
    width:min(1240px, calc(100% - 32px));
    margin:0 auto;
    padding:18px 0 40px;
  }

  .hero{
    position:relative;
    overflow:hidden;
    border-radius:var(--radius-xl);
    background:
      linear-gradient(135deg, rgba(6,18,32,.94) 0%, rgba(14,39,63,.90) 58%, rgba(37,64,96,.82) 100%);
    box-shadow:var(--shadow);
    padding:34px 32px 30px;
    margin-bottom:24px;
    border:1px solid rgba(255,255,255,.06);
  }

  .hero::before{
    content:"";
    position:absolute;
    inset:auto -60px -60px auto;
    width:280px;
    height:280px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,.18), transparent 65%);
    pointer-events:none;
  }

  .eyebrow{
    font-size:12px;
    line-height:1;
    text-transform:uppercase;
    letter-spacing:.16em;
    color:rgba(255,255,255,.72);
    margin-bottom:14px;
  }

  .hero-title{
    margin:0 0 14px;
    font-size:54px;
    line-height:1.02;
    font-weight:800;
    max-width:760px;
  }

  .hero-text{
    margin:0;
    max-width:760px;
    color:var(--muted);
    font-size:18px;
    line-height:1.5;
  }

  .hero-badges{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:22px;
  }

  .hero-badge{
    display:inline-flex;
    align-items:center;
    min-height:38px;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    font-size:14px;
    color:#fff;
  }

  .section-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .section-title{
    margin:0;
    font-size:30px;
    line-height:1.1;
    font-weight:800;
  }

  .section-note{
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:22px;
  }

  .card{
    background:linear-gradient(180deg, rgba(18,45,71,.98), rgba(13,34,56,.98));
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 10px 28px rgba(0,0,0,.22);
    transition:transform .18s ease, box-shadow .18s ease;
  }

  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 18px 36px rgba(0,0,0,.30);
  }

  .poster-wrap{
    position:relative;
    background:#0b1827;
  }

  .poster{
    width:100%;
    aspect-ratio:2/3;
    object-fit:cover;
    display:block;
  }

  .poster-badge{
    position:absolute;
    left:12px;
    top:12px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(7,17,28,.72);
    backdrop-filter:blur(4px);
    color:#fff;
    font-size:12px;
    font-weight:700;
    border:1px solid rgba(255,255,255,.08);
  }

  .card-body{
    padding:16px 16px 18px;
  }

  .title{
    font-weight:700;
    font-size:19px;
    line-height:1.3;
    margin-bottom:8px;
    min-height:50px;
  }

  .date{
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
    margin-bottom:14px;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    min-height:46px;
    padding:0 14px;
    background:var(--accent);
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:#111827;
    font-weight:700;
    transition:.15s ease;
  }

  .btn:hover{
    background:var(--accent-hover);
    transform:translateY(-1px);
  }

  .empty{
    padding:24px;
    border-radius:20px;
    background:rgba(255,255,255,.04);
    border:1px dashed rgba(255,255,255,.14);
    color:var(--muted);
    text-align:center;
    font-size:16px;
  }

  @media (max-width:760px){
    .page{
      width:min(100% - 16px, 1240px);
      padding:12px 0 24px;
    }

    .hero{
      padding:22px 18px 20px;
      border-radius:22px;
      margin-bottom:18px;
    }

    .hero-title{
      font-size:34px;
    }

    .hero-text{
      font-size:15px;
    }

    .section-title{
      font-size:24px;
    }

    .grid{
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .card-body{
      padding:14px;
    }

    .title{
      font-size:16px;
      min-height:auto;
    }
  }

  @media (max-width:560px){
    .grid{
      grid-template-columns:1fr;
    }

    .hero-badges{
      gap:8px;
    }

    .hero-badge{
      font-size:13px;
      min-height:34px;
      padding:7px 11px;
    }
  }
</style>
</head>

<body>

<div class="page">

  <section class="hero">
    <div class="eyebrow">Ваш Адмін • Квитки онлайн</div>
    <h1 class="hero-title">Академія Руху</h1>
    <p class="hero-text">
      Оберіть виставу, перегляньте доступні місця та придбайте квитки онлайн у кілька кроків.
    </p>

    <div class="hero-badges">
      <div class="hero-badge">Офіційна онлайн-афіша</div>
      <div class="hero-badge">Вибір місць на схемі залу</div>
      <div class="hero-badge">Квиток з QR-кодом</div>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2 class="section-title">Найближчі події</h2>
      <div class="section-note">Актуальні сеанси Академії Руху</div>
    </div>

    <div class="grid" id="grid"></div>
  </section>

</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

async function loadSeances(){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?select=id,show,date,time,poster_url,venue_id,active,status&venue_id=eq.academy&order=date.asc`,
    {
      headers:{
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      }
    }
  );

  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const visible = Array.isArray(data)
    ? data.filter(s => s.active !== false && s.status !== "archived")
    : [];

  if (!visible.length) {
    grid.innerHTML = `<div class="empty">Поки що немає активних сеансів.</div>`;
    return;
  }

  visible.forEach(s => {
    const img = s.poster_url || "images/default.jpg";

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="poster-wrap">
        <img src="${img}" class="poster" onerror="this.src='images/default.jpg'">
        <div class="poster-badge">Академія Руху</div>
      </div>
      <div class="card-body">
        <div class="title">${s.show || "Вистава"}</div>
        <div class="date">${formatDate(s.date, s.time)}</div>
        <a class="btn" href="hall.html?seance=${encodeURIComponent(s.id)}">
          Купити квитки
        </a>
      </div>
    `;

    grid.appendChild(el);
  });
}

function formatDate(date, time){
  if(!date) return "Дата уточнюється";

  const d = new Date(date);
  const day = d.getDate().toString().padStart(2,"0");
  const month = (d.getMonth()+1).toString().padStart(2,"0");

  return `${day}.${month} ${time || ""}`.trim();
}

loadSeances();
</script>

</body>
</html>
