<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Квиток / E-Ticket</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@page { size: A4; margin: 10mm; }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f4f6;
}

.page{
  width:800px;
  margin:0 auto;
  background:#fff;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
  display:flex;
  justify-content:space-between;
  border-bottom:2px solid #000;
  padding-bottom:8px;
  margin-bottom:16px;
}

.logo{
  font-weight:700;
}

.ticket-num{
  font-size:12px;
}

.main{
  display:flex;
  gap:20px;
}

.left{
  flex:1;
}

.right{
  width:200px;
  text-align:center;
}

.poster{
  width:100%;
  margin-bottom:10px;
}

.qr{
  margin-top:10px;
}

.row{
  margin-bottom:6px;
  font-size:14px;
}

.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:10px;
}

.rules{
  margin-top:20px;
  border-top:1px solid #000;
  padding-top:10px;
  font-size:12px;
}

.footer{
  margin-top:20px;
  border-top:1px solid #000;
  padding-top:10px;
  font-size:12px;
}
</style>

<script src="../vendor/qrcode.min.js"></script>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="logo" id="venueName"></div>
    <div class="ticket-num" id="ticketId"></div>
  </div>

  <div class="main">

    <div class="left">

      <div class="title" id="eventTitle"></div>

      <div class="row" id="eventDate"></div>
      <div class="row" id="eventTime"></div>
      <div class="row" id="seat"></div>
      <div class="row" id="price"></div>
      <div class="row" id="order"></div>

    </div>

    <div class="right">
      <img id="poster" class="poster">
      <div id="qr" class="qr"></div>
    </div>

  </div>

  <div class="rules">
    Квиток дійсний тільки на зазначений захід.<br>
    Заборонено копіювання та передача третім особам.
  </div>

  <div class="footer" id="venueFooter"></div>

</div>

<script>
(function(){

  // 👉 ОДИН источник данных
  const data = JSON.parse(decodeURIComponent(new URLSearchParams(location.search).get("data") || "{}"));

  const venueMap = {
    academy: {
      name: "Академія руху, Кривий Ріг",
      footer: "Організатор: Академія руху"
    },
    shevchenko: {
      name: "Театр ім. Т. Г. Шевченка",
      footer: "Організатор: Театр ім. Т. Г. Шевченка"
    }
  };

  const posterMap = {
    "Сонечко всередині": "../images/sonechko.jpg",
    "Залишайся собою": "../images/zalyshaysya.jpg"
  };

  const venue = venueMap[data.venue] || venueMap.academy;

  document.getElementById("venueName").textContent = venue.name;
  document.getElementById("venueFooter").textContent = venue.footer;

  document.getElementById("ticketId").textContent = "№ " + (data.ticket || "");
  document.getElementById("eventTitle").textContent = data.event || "";

  document.getElementById("eventDate").textContent = "Дата: " + (data.date || "");
  document.getElementById("eventTime").textContent = "Час: " + (data.time || "");
  document.getElementById("seat").textContent = "Місце: " + (data.seat || "");
  document.getElementById("price").textContent = "Ціна: " + (data.price || "") + " грн";
  document.getElementById("order").textContent = "Замовлення: " + (data.order || "");

  document.getElementById("poster").src =
    posterMap[data.event] || "../images/default.jpg";

  if(data.payload){
    new QRCode(document.getElementById("qr"),{
      text: data.payload,
      width:140,
      height:140
    });
  }

})();
</script>

</body>
</html>
