<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Електронний квиток</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  padding:20px;
}

.ticket{
  width:440px;
  background:#fff;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,.12);
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  border-bottom:1px solid #eee;
  padding-bottom:6px;
}

.title{
  font-size:20px;
  font-weight:800;
  margin:10px 0 6px;
}

.meta{
  font-size:13px;
  margin-bottom:4px;
}

.layout{
  display:flex;
  gap:16px;
  margin-top:12px;
}

.left{
  flex:1;
}

.right{
  width:140px;
  text-align:center;
}

.poster{
  width:100%;
  border-radius:8px;
  margin-bottom:8px;
  background:#eee;
}

.qr{
  width:120px;
  height:120px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
}

.footer{
  font-size:11px;
  margin-top:14px;
  color:#555;
  border-top:1px solid #eee;
  padding-top:10px;
}
</style>

<script src="../vendor/qrcode.min.js"></script>
</head>

<body>
<div class="ticket">

  <div class="header">
    <div>КВИТОК / E-TICKET</div>
    <div id="ticketId"></div>
  </div>

  <div class="title" id="eventTitle"></div>

  <div class="meta" id="eventDate"></div>
  <div class="meta" id="eventTime"></div>
  <div class="meta" id="theatreName"></div>

  <div class="layout">

    <div class="left">
      <div class="meta" id="seatInfo"></div>
      <div class="meta" id="priceInfo"></div>
      <div class="meta" id="orderInfo"></div>
    </div>

    <div class="right">
      <img id="poster" class="poster">
      <div id="qr" class="qr"></div>
    </div>

  </div>

  <div class="footer">
    Квиток дійсний на одну особу.<br>
    Зберігайте до кінця заходу.
  </div>

</div>

<script>
(function(){

  const p = new URLSearchParams(location.search);

  const data = {
    ticket: p.get("ticket") || "—",
    event: p.get("event") || "Подія",
    date: p.get("date") || "—",
    time: p.get("time") || "—",
    seat: p.get("seat") || "—",
    price: p.get("price") || "—",
    order: p.get("order") || "—",
    payload: p.get("payload") || "",
    venue: p.get("venue") || "academy"
  };

  const venueMap = {
    academy: "Академія руху, Кривий Ріг",
    shevchenko: "Театр ім. Т. Г. Шевченка"
  };

  const posterMap = {
    "Сонечко всередині": "../images/sonechko.jpg",
    "Залишайся собою": "../images/zalyshaysya.jpg"
  };

  document.getElementById("ticketId").textContent = "№ " + data.ticket;
  document.getElementById("eventTitle").textContent = data.event;

  document.getElementById("eventDate").textContent = "Дата: " + data.date;
  document.getElementById("eventTime").textContent = "Час: " + data.time;

  document.getElementById("theatreName").textContent =
    venueMap[data.venue] || "Майданчик";

  document.getElementById("seatInfo").textContent = "Місце: " + data.seat;
  document.getElementById("priceInfo").textContent = "Ціна: " + data.price + " грн";
  document.getElementById("orderInfo").textContent = "Замовлення: " + data.order;

  document.getElementById("poster").src =
    posterMap[data.event] || "../images/default.jpg";

  const qrBox = document.getElementById("qr");

  if(data.payload){
    new QRCode(qrBox,{
      text: data.payload,
      width:120,
      height:120
    });
  } else {
    qrBox.innerHTML = "QR відсутній";
  }

})();
</script>

</body>
</html>
