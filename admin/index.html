<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вхід</title>
<link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

<div style="
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0f172a;
">

  <div class="card" style="
    width:320px;
    text-align:center;
    background:#1e293b;
    color:white;
    border-radius:20px;
    padding:40px;
  ">

    <h2 style="margin-bottom:20px;">Оберіть режим</h2>

    <button class="btn" style="
      width:100%;
      height:50px;
      margin-bottom:10px;
      background:#3b82f6;
    " onclick="admin()">Адмін</button>

    <button class="btn" style="
      width:100%;
      height:50px;
      background:#22c55e;
    " onclick="cash()">Касир</button>

  </div>
</div>

<script>
function admin(){
  localStorage.setItem("role","admin");
  location.href="panel.html";
}

function cash(){
  localStorage.setItem("role","cashier");
  location.href="../hybrid/hall-cash.html";
}
</script>

</body>
</html>
