<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вхід у систему</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles/styles.css">

<style>
  .login-wrap{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    padding:20px;
  }

  .login-card{
    width:100%;
    max-width:380px;
    text-align:center;
    background:#1e293b;
    color:white;
    border-radius:22px;
    padding:36px 28px;
    box-shadow:0 18px 40px rgba(0,0,0,.28);
  }

  .login-title{
    margin:0 0 8px;
    font-size:32px;
    font-weight:800;
  }

  .login-subtitle{
    margin:0 0 22px;
    color:#cbd5e1;
    font-size:15px;
    line-height:1.45;
  }

  .login-field{
    text-align:left;
    margin-bottom:14px;
  }

  .login-field label{
    display:block;
    margin-bottom:6px;
    color:#cbd5e1;
    font-size:13px;
  }

  .login-field input{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    padding:0 14px;
    font-size:15px;
    background:#fff;
    color:#111827;
    outline:none;
  }

  .login-btn{
    width:100%;
    height:52px;
    border:none;
    border-radius:14px;
    background:#3b82f6;
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
  }

  .login-btn:hover{
    background:#2563eb;
  }

  .login-note{
    margin-top:16px;
    font-size:13px;
    color:#94a3b8;
    line-height:1.45;
  }

  .login-error{
    min-height:22px;
    margin-top:12px;
    color:#fca5a5;
    font-size:14px;
    font-weight:600;
  }
</style>
</head>

<body>

<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">Ваш Адмін</h1>
    <p class="login-subtitle">
      Вхід у систему керування продажами театру
    </p>

    <div class="login-field">
      <label for="login">Логін</label>
      <input id="login" autocomplete="username" placeholder="admin або kassa1">
    </div>

    <div class="login-field">
      <label for="password">Пароль</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Введіть пароль">
    </div>

    <button class="login-btn" id="btnLogin">Увійти</button>

    <div class="login-error" id="loginError"></div>

    <div class="login-note">
      Кожен користувач бачить лише свій рівень доступу.
    </div>
  </div>
</div>

<script>
const SESSION_KEY = "va_session_v1";

/*
  Для быстрого внедрения сегодня.
  Потом можно вынести в backend / Supabase Auth.
*/
const USERS = {
  admin: {
    password: "va2026admin",
    role: "admin",
    redirect: "panel.html"
  },
  kassa1: {
    password: "va2026cash",
    role: "cashier",
    redirect: "../hybrid/hall-cash.html"
  }
};

function saveSession(user, role){
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    user,
    role,
    login_at: new Date().toISOString()
  }));
}

function getSession(){
  try{
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
  }catch(e){
    return null;
  }
}

function doLogin(){
  const login = document.getElementById("login").value.trim();
  const password = document.getElementById("password").value;
  const err = document.getElementById("loginError");

  err.textContent = "";

  if (!login || !password){
    err.textContent = "Введіть логін і пароль";
    return;
  }

  const user = USERS[login];
  if (!user || user.password !== password){
    err.textContent = "Невірний логін або пароль";
    return;
  }

  saveSession(login, user.role);
  location.href = user.redirect;
}

document.getElementById("btnLogin").addEventListener("click", doLogin);

document.getElementById("password").addEventListener("keydown", (e)=>{
  if (e.key === "Enter") doLogin();
});

document.getElementById("login").addEventListener("keydown", (e)=>{
  if (e.key === "Enter") doLogin();
});

/* если уже вошли — сразу отправляем */
const session = getSession();
if (session?.role === "admin") {
  location.href = "panel.html";
}
if (session?.role === "cashier") {
  location.href = "../hybrid/hall-cash.html";
}
</script>

</body>
</html>
