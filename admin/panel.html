<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Адмін</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

<div class="admin-center">
  <div class="admin-card">

    <div class="admin-title">🎛 Адміністрація</div>

    <button class="admin-btn admin-btn-blue" onclick="toCash()">Події / Каса</button>
    <button class="admin-btn admin-btn-green" onclick="toEditor()">Редактор сеансів</button>
    <button class="admin-btn admin-btn-gray" onclick="toManage()">Керування сеансами</button>
    <button class="admin-btn admin-btn-gray" onclick="toReports()">Звіти</button>
    <button class="admin-btn admin-btn-red" onclick="logout()">Вихід</button>

  </div>
</div>

<script>
const SESSION_KEY = "va_session_v1";

function getSession(){
  try{
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
  }catch(e){
    return null;
  }
}

const session = getSession();

if (!session || session.role !== "admin") {
  location.href = "index.html";
}

function toCash(){
  window.open(
    "../hybrid/hall-cash.html",
    "cashWindow",
    "width=1280,height=900"
  );
}

function toEditor(){
  location.href = "seance-editor.html";
}

function toManage(){
  location.href = "manage.html";
}

function toReports(){
  location.href = "reports/index.html";
}

function logout(){
  localStorage.removeItem(SESSION_KEY);
  location.href = "index.html";
}
</script>

</body>
</html>
