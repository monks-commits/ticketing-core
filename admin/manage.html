<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Керування сеансами — VA Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#061a3a;
  --card:#1d2d47;
  --card-2:#223552;
  --text:#ffffff;
  --muted:#b8c4d6;
  --line:rgba(255,255,255,.10);

  --primary:#4c86f7;
  --primary-hover:#3f78e6;

  --success:#2ecc71;
  --success-hover:#28b864;

  --neutral:#50627d;
  --neutral-hover:#44556d;

  --danger:#f44336;
  --danger-hover:#df392d;

  --shadow:0 18px 40px rgba(0,0,0,.22);
  --radius-xl:24px;
  --radius-lg:18px;
  --radius-md:14px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.page-wrap{
  width:min(1240px, calc(100% - 48px));
  margin:0 auto;
  padding:48px 0 56px;
}

.topbar{
  margin-bottom:28px;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#111827;
  font-size:16px;
  cursor:pointer;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 8px 20px rgba(0,0,0,.16);
}

.hero{
  margin-bottom:28px;
}

.hero h1{
  margin:0 0 10px;
  font-size:56px;
  line-height:1.05;
  font-weight:800;
}

.hero p{
  margin:0;
  color:var(--muted);
  font-size:18px;
  line-height:1.45;
  max-width:860px;
}

.section{
  background:var(--card);
  border-radius:var(--radius-xl);
  padding:24px 20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.section-title{
  margin:0;
  font-size:28px;
  line-height:1.1;
}

.section-note{
  color:var(--muted);
  font-size:14px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.row{
  background:var(--card-2);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:18px;
  align-items:center;
}

.meta{
  min-width:0;
}

.title{
  font-size:22px;
  font-weight:800;
  line-height:1.2;
  margin-bottom:8px;
}

.sub{
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
  word-break:break-word;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  line-height:1;
  font-weight:700;
  background:rgba(255,255,255,.10);
  color:#fff;
}

.badge-venue{
  background:#304866;
}

.badge-active{
  background:#14532d;
}

.badge-archived{
  background:#475569;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:flex-end;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:120px;
  min-height:42px;
  padding:0 16px;
  border:none;
  border-radius:14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  transition:.15s ease;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:var(--primary);
  color:#fff;
}

.btn-primary:hover{
  background:var(--primary-hover);
}

.btn-success{
  background:var(--success);
  color:#08111f;
}

.btn-success:hover{
  background:var(--success-hover);
}

.btn-neutral{
  background:var(--neutral);
  color:#fff;
}

.btn-neutral:hover{
  background:var(--neutral-hover);
}

.btn-danger{
  background:var(--danger);
  color:#fff;
}

.btn-danger:hover{
  background:var(--danger-hover);
}

.empty{
  color:var(--muted);
  font-size:15px;
  padding:8px 2px;
}

@media (max-width:900px){
  .page-wrap{
    width:min(100% - 24px, 1240px);
    padding:24px 0 32px;
  }

  .hero h1{
    font-size:38px;
  }

  .hero p{
    font-size:16px;
  }

  .section{
    padding:20px 16px;
  }

  .row{
    grid-template-columns:1fr;
  }

  .actions{
    justify-content:flex-start;
  }

  .btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="page-wrap">

  <div class="topbar">
    <a class="back-btn" href="./index.html">← Назад</a>
  </div>

  <section class="hero">
    <h1>🎭 Керування сеансами</h1>
    <p>Робочий центр керування подіями: каса, редактор, звіти, архівування та відновлення сеансів.</p>
  </section>

  <section class="section">
    <div class="section-head">
      <h2 class="section-title">Активні</h2>
      <div class="section-note">Сеанси, доступні для роботи зараз</div>
    </div>
    <div id="active" class="list"></div>
  </section>

  <section class="section">
    <div class="section-head">
      <h2 class="section-title">Архів</h2>
      <div class="section-note">Завершені або вручну архівовані сеанси</div>
    </div>
    <div id="archived" class="list"></div>
  </section>

</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function venueToHuman(v){
  if (v === "academy") return "Академія Руху";
  if (v === "shevchenko") return "Театр Шевченка";
  return v || "—";
}

function formatDateTime(s){
  const parts = [];
  if (s.date) parts.push(s.date);
  if (s.time) parts.push(s.time);
  return parts.join(" • ") || "Дата/час не вказані";
}

function detectShowTitle(s){
  return s.show || s.title || s.name || "Без назви";
}

function makeSeanceCard(s, archivedMode = false){
  const title = escapeHtml(detectShowTitle(s));
  const id = escapeHtml(s.id || "");
  const venue = escapeHtml(venueToHuman(s.venue_id));
  const dt = escapeHtml(formatDateTime(s));

  if (!archivedMode) {
    return `
      <div class="row">
        <div class="meta">
          <div class="title">${title}</div>
          <div class="sub"><b>Seance ID:</b> ${id}</div>
          <div class="sub">${dt}</div>

          <div class="badges">
            <span class="badge badge-venue">${venue}</span>
            <span class="badge badge-active">Активний</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="openCash('${id}')">Каса</button>
          <button class="btn btn-neutral" onclick="openEditor('${id}')">Редактор</button>
          <button class="btn btn-neutral" onclick="openReports()">Звіти</button>
          <button class="btn btn-danger" onclick="archiveSeance('${id}')">Архівувати</button>
        </div>
      </div>
    `;
  }

  return `
    <div class="row">
      <div class="meta">
        <div class="title">${title}</div>
        <div class="sub"><b>Seance ID:</b> ${id}</div>
        <div class="sub">${dt}</div>

        <div class="badges">
          <span class="badge badge-venue">${venue}</span>
          <span class="badge badge-archived">Архів</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-success" onclick="restoreSeance('${id}')">Відновити</button>
      </div>
    </div>
  `;
}

async function load(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Cache-Control": "no-cache"
    },
    cache: "no-store"
  });

  const data = await res.json();

  const now = new Date();
  const toArchive = [];

  data.forEach(s => {
    if (s.archived === true) return;

    let dt;

    if (s.date && s.time) {
      dt = new Date(`${s.date}T${s.time}`);
    } else if (s.id) {
      const match = s.id.match(/(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);
      if (match) {
        const [_, y, m, d, h, min] = match;
        dt = new Date(`${y}-${m}-${d}T${h}:${min}`);
      }
    }

    if (!dt || isNaN(dt)) return;

    if (dt < now) {
      toArchive.push(s.id);
    }
  });

  if (toArchive.length){
    await fetch(
      `${SUPABASE_URL}/rest/v1/seances?id=in.(${toArchive.join(",")})`,
      {
        method:"PATCH",
        headers:{
          apikey: SUPABASE_ANON_KEY,
          Authorization: "Bearer " + SUPABASE_ANON_KEY,
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          archived:true,
          active:false
        })
      }
    );
  }

  const res2 = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY
    },
    cache: "no-store"
  });

  const fresh = await res2.json();

  const active = [];
  const archived = [];

  fresh.forEach(s => {
    if (s.archived === true) archived.push(s);
    else active.push(s);
  });

  active.sort((a,b) => String(a.date || "").localeCompare(String(b.date || "")) || String(a.time || "").localeCompare(String(b.time || "")));
  archived.sort((a,b) => String(b.date || "").localeCompare(String(a.date || "")) || String(b.time || "").localeCompare(String(a.time || "")));

  const activeDiv = document.getElementById("active");
  const archDiv = document.getElementById("archived");

  activeDiv.innerHTML = active.length
    ? active.map(s => makeSeanceCard(s, false)).join("")
    : `<div class="empty">Немає активних сеансів.</div>`;

  archDiv.innerHTML = archived.length
    ? archived.map(s => makeSeanceCard(s, true)).join("")
    : `<div class="empty">Архів порожній.</div>`;
}

async function archiveSeance(id){
  await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${encodeURIComponent(id)}`, {
    method:"PATCH",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ archived:true, active:false })
  });
  load();
}

async function restoreSeance(id){
  await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${encodeURIComponent(id)}`, {
    method:"PATCH",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      archived:false,
      active:true
    })
  });
  load();
}

function openCash(id){
  window.open(`../hybrid/hall-cash.html?seance=${encodeURIComponent(id)}`, "_blank");
}

function openEditor(id){
  window.open(`./seance-editor.html?seance=${encodeURIComponent(id)}`, "_blank");
}

function openReports(){
  window.open(`./reports/index.html`, "_blank");
}

load();
</script>

</body>
</html>
