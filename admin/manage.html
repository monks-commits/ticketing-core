<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Керування сеансами</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1a2b;
  color:#fff;
}

.container{
  max-width:900px;
  margin:40px auto;
}

h1{
  margin-bottom:20px;
}

.card{
  background:#1c2b3f;
  padding:20px;
  border-radius:12px;
  margin-bottom:30px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.btn{
  padding:6px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  margin-left:6px;
}

.blue{background:#2d6cdf;color:#fff;}
.red{background:#e53935;color:#fff;}
.green{background:#2ecc71;color:#fff;}
.back{
  background:#fff;
  color:#000;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<button class="btn back" onclick="location.href='index.html'">← Назад</button>

<h1>🎭 Керування сеансами</h1>

<div class="card">
  <h3>Активні</h3>
  <div id="active"></div>
</div>

<div class="card">
  <h3>Архів</h3>
  <div id="archived"></div>
</div>

</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

async function load(){

  const res = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Cache-Control": "no-cache"
    },
    cache: "no-store"
  });

  const data = await res.json();

  const now = new Date();
  const toArchive = [];

  // определяем прошедшие
  data.forEach(s => {

    if (s.archived === true) return;

    let dt;

    // если есть date/time
    if (s.date && s.time) {
      dt = new Date(`${s.date}T${s.time}`);
    }

    // иначе парсим из id
    else if (s.id) {
      const match = s.id.match(/(\d{4})-(\d{2})-(\d{2})-(\d{2})-(\d{2})/);
      if (match) {
        const [_, y, m, d, h, min] = match;
        dt = new Date(`${y}-${m}-${d}T${h}:${min}`);
      }
    }

    if (!dt || isNaN(dt)) return;

    if (dt < now) {
      toArchive.push(s.id);
    }

  });

  // архивируем
  if (toArchive.length){
    await fetch(
      `${SUPABASE_URL}/rest/v1/seances?id=in.(${toArchive.join(",")})`,
      {
        method:"PATCH",
        headers:{
          apikey: SUPABASE_ANON_KEY,
          Authorization: "Bearer " + SUPABASE_ANON_KEY,
          "Content-Type":"application/json"
        },
        body: JSON.stringify({ 
          archived:true,
          active:false
        })
      }
    );
  }

  // перечитываем
  const res2 = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY
    },
    cache: "no-store"
  });

  const fresh = await res2.json();

  const active = [];
  const archived = [];

  fresh.forEach(s => {
    if (s.archived === true) archived.push(s);
    else active.push(s);
  });

  const activeDiv = document.getElementById("active");
  const archDiv = document.getElementById("archived");

  activeDiv.innerHTML = "";
  archDiv.innerHTML = "";

  active.forEach(s => {
    activeDiv.innerHTML += `
      <div class="row">
        <div>${s.id}</div>
        <div>
          <button class="btn blue" onclick="openSeance('${s.id}')">Відкрити</button>
          <button class="btn red" onclick="archive('${s.id}')">Архівувати</button>
        </div>
      </div>
    `;
  });

  archived.forEach(s => {
    archDiv.innerHTML += `
      <div class="row">
        <div>${s.id}</div>
        <div>
          <button class="btn green" onclick="restore('${s.id}')">Відновити</button>
        </div>
      </div>
    `;
  });

}

async function archive(id){
  await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ archived:true, active:false })
  });
  load();
}

async function restore(id){
  await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ archived:false, active:true })
  });
  load();
}

function openSeance(id){
  window.open(`../hybrid/hall-cash.html?seance=${id}`);
}

load();
</script>

</body>
</html>
