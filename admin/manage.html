<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Керування сеансами</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:30px;
}

h1 {
  margin-bottom:20px;
}

.block {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #334155;
}

button {
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  margin-left:6px;
}

.open { background:#2563eb; color:white; }
.archive { background:#dc2626; color:white; }
.restore { background:#16a34a; color:white; }

.back {
  margin-bottom:20px;
}
</style>

</head>
<body>

<h1>🎭 Керування сеансами</h1>

<button class="back" onclick="location.href='index.html'">← Назад</button>

<div class="block">
  <h3>Активні</h3>
  <div id="active"></div>
</div>

<div class="block">
  <h3>Архів</h3>
  <div id="archived"></div>
</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

async function load() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY
    }
  });

  const data = await res.json();

  const active = data.filter(s => !s.archived);
  const archived = data.filter(s => s.archived);

  render(active, document.getElementById("active"), false);
  render(archived, document.getElementById("archived"), true);
}

function render(list, container, isArchive) {
  container.innerHTML = "";

  list.forEach(s => {
    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div>${s.id}</div>

      <div>
        ${
          isArchive
            ? `<button class="restore" onclick="restore('${s.id}')">Відновити</button>`
            : `
              <button class="open" onclick="openSeance('${s.id}')">Відкрити</button>
              <button class="archive" onclick="archive('${s.id}')">Архівувати</button>
            `
        }
      </div>
    `;

    container.appendChild(row);
  });
}

function openSeance(id){
  window.open("../hybrid/hall-cash.html?seance=" + id, "_blank");
}

async function archive(id){
  console.log("ARCHIVE:", id);

  const res = await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      Prefer: "return=minimal"
    },
    body: JSON.stringify({ archived: true })
  });

  console.log("STATUS:", res.status);

  if (!res.ok) {
    const txt = await res.text();
    console.error("ERROR:", txt);
    alert("Ошибка архивации");
    return;
  }

  load();
}

async function restore(id){
  await fetch(`${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ archived: false })
  });

  load();
}

load();
</script>

</body>
</html>
