<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Керування сеансами</title>

<style>
body {
  font-family: Arial;
  background: #0b1628;
  color: #fff;
  padding: 20px;
}

h1 {
  display: flex;
  align-items: center;
  gap: 10px;
}

.section {
  background: #1c2a3f;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #2c3e5a;
}

.btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-left: 5px;
}

.blue { background: #2d6cdf; color: #fff; }
.red { background: #e53935; color: #fff; }
.green { background: #2e7d32; color: #fff; }

.back {
  margin-bottom: 10px;
}
</style>

</head>
<body>

<button class="back" onclick="history.back()">← Назад</button>

<h1>🎭 Керування сеансами</h1>

<div class="section">
  <h3>Активні</h3>
  <div id="active"></div>
</div>

<div class="section">
  <h3>Архів</h3>
  <div id="archived"></div>
</div>

<script>

const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

// ================= LOAD =================

async function load() {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/seances?select=*`, {
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + SUPABASE_ANON_KEY
    }
  });

  const data = await res.json();

  // 🔥 ЧЁТКАЯ ФИЛЬТРАЦИЯ
  const active = data.filter(s => s.archived !== true);
  const archived = data.filter(s => s.archived === true);

  const activeEl = document.getElementById("active");
  const archivedEl = document.getElementById("archived");

  // 💥 ОБЯЗАТЕЛЬНО ОЧИЩАЕМ
  activeEl.innerHTML = "";
  archivedEl.innerHTML = "";

  // ===== АКТИВНЫЕ =====
  active.forEach(s => {
    activeEl.innerHTML += `
      <div class="row">
        <div>${s.id}</div>
        <div>
          <button class="btn blue" onclick="openSeance('${s.id}')">Відкрити</button>
          <button class="btn red" onclick="archive('${s.id}')">Архівувати</button>
        </div>
      </div>
    `;
  });

  // ===== АРХИВ =====
  archived.forEach(s => {
    archivedEl.innerHTML += `
      <div class="row">
        <div>${s.id}</div>
        <div>
          <button class="btn green" onclick="restore('${s.id}')">Відновити</button>
        </div>
      </div>
    `;
  });
}

// ================= ARCHIVE =================

async function archive(id) {

  console.log("ARCHIVE:", id);

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`,
    {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ archived: true })
    }
  );

  console.log("STATUS:", res.status);

  await load();
}

// ================= RESTORE =================

async function restore(id) {

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?id=eq.${id}`,
    {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ archived: false })
    }
  );

  await load();
}

// ================= OPEN =================

function openSeance(id) {
  window.open(`../hybrid/hall-cash.html?seance=${id}`, "_blank");
}

// ================= START =================

load();

</script>

</body>
</html>
