<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>КГ-13</title>

<style>
  body {
    font-family: Arial;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
  }

  input, button {
    padding: 6px 10px;
    font-size: 14px;
  }

  .report {
    margin-top: 20px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h1>Форма КГ-13 (щоденний звіт касира)</h1>

<div class="toolbar">
  <button onclick="history.back()">← Назад</button>

  Дата:
  <input type="date" id="day">

  Касир:
  <input type="text" id="cashier" value="cash">

  <button onclick="load()">Сформувати</button>
  <button onclick="window.print()">Друк</button>
</div>

<div id="result" class="report"></div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

// авто подстановка из URL
const params = new URLSearchParams(location.search);
const dayParam = params.get("day");
const cashierParam = params.get("cashier");

if (dayParam) document.getElementById("day").value = dayParam;
if (cashierParam) document.getElementById("cashier").value = cashierParam;

async function load() {
  const day = document.getElementById("day").value;
  const cashier = document.getElementById("cashier").value;

  if (!day) {
    alert("Вкажіть дату");
    return;
  }

  const from = day + "T00:00:00";
  const to = day + "T23:59:59";

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/orders?select=*&created_at=gte.${from}&created_at=lte.${to}`,
      {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: "Bearer " + SUPABASE_ANON_KEY
        }
      }
    );

    const data = await res.json();

    if (!Array.isArray(data)) {
      document.getElementById("result").innerText =
        "Помилка: " + JSON.stringify(data);
      return;
    }

    const orders = data.filter(o =>
      !o.cashier || o.cashier === cashier
    );

    let total = 0;
    let count = 0;

    for (const o of orders) {
      total += Number(o.total || 0);
      count++;
    }

    document.getElementById("result").innerHTML = `
      <b>Дата:</b> ${day}<br>
      <b>Касир:</b> ${cashier}<br><br>
      <b>Кількість чеків:</b> ${count}<br>
      <b>Сума:</b> ${total} грн
    `;

  } catch (e) {
    document.getElementById("result").innerText = "Помилка: " + e.message;
  }
}

// автозапуск если пришли параметры
if (dayParam) load();
</script>

</body>
</html>
