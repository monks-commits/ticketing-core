<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>КГ-13 (щоденний звіт касира)</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h1>Форма КГ-13 (щоденний звіт касира)</h1>

<div style="margin-bottom:15px;">
  <button onclick="history.back()">← Назад</button>

  Дата:
  <input type="date" id="day">

  Касир:
  <input type="text" id="cashier" value="cash">

  <button onclick="generate()">Сформувати</button>
  <button onclick="window.print()">Друк</button>
</div>

<hr>

<div id="result">
  <p><b>Дата:</b> <span id="r-day">—</span></p>
  <p><b>Касир:</b> <span id="r-cashier">—</span></p>
  <br>
  <p><b>Кількість чеків:</b> <span id="r-count">0</span></p>
  <p><b>Сума:</b> <span id="r-sum">0</span> грн</p>
</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "ВСТАВЬ_СВОЙ_АНОН_KEY"; // ← вставь свой ключ

function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    day: p.get("day"),
    cashier: p.get("cashier")
  };
}

function setForm(day, cashier) {
  if (day) document.getElementById("day").value = day;
  if (cashier) document.getElementById("cashier").value = cashier;
}

function generate() {
  const day = document.getElementById("day").value;
  const cashier = document.getElementById("cashier").value.trim();

  if (!day || !cashier) {
    alert("Вкажіть дату та касира");
    return;
  }

  location.href = `kg13.html?day=${day}&cashier=${encodeURIComponent(cashier)}`;
}

async function load() {
  const { day, cashier } = getParams();

  if (!day || !cashier) return;

  document.getElementById("r-day").textContent = day;
  document.getElementById("r-cashier").textContent = cashier;

  try {
    // ✅ БЕРЕМ ТОЛЬКО ПРОДАННЫЕ БИЛЕТЫ
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?select=price,status,created_at,cashier&status=in.(sold,used)`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    const tickets = await res.json();

    // фильтр по дате и кассиру
    const filtered = tickets.filter(t =>
      t.created_at &&
      t.created_at.startsWith(day) &&
      (!t.cashier || t.cashier === cashier)
    );

    const count = filtered.length;

    const sum = filtered.reduce((acc, t) => {
      return acc + Number(t.price || 0);
    }, 0);

    document.getElementById("r-count").textContent = count;
    document.getElementById("r-sum").textContent = sum;

  } catch (e) {
    console.error(e);
    alert("Помилка завантаження звіту");
  }
}

// init
(function () {
  const { day, cashier } = getParams();

  setForm(day, cashier);

  if (day && cashier) {
    load();
  }
})();
</script>

</body>
</html>
