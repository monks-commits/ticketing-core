<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>КГ-13</title>
<script src="../lib/supabase.js"></script>
<script src="../lib/reports-api.js"></script>
</head>

<body style="font-family:Arial;padding:20px;">

<h2>КГ-13 (щоденний звіт касира)</h2>

<button onclick="history.back()">← Назад</button>

Дата:
<input type="date" id="day">

Касир:
<input type="text" id="cashier" value="cash">

<button onclick="run()">Сформувати</button>
<button onclick="window.print()">Друк</button>

<hr>

<div id="out"></div>

<script>
async function run() {

  const day = document.getElementById("day").value;
  const cashier = document.getElementById("cashier").value.trim();

  if (!day || !cashier) {
    alert("Вкажіть дату та касира");
    return;
  }

  try {
    const r = await getKG13(day, cashier);

    document.getElementById("out").innerHTML = `
      <p><b>Дата:</b> ${r.date}</p>
      <p><b>Касир:</b> ${r.cashier}</p>
      <p><b>Кількість:</b> ${r.count}</p>
      <p><b>Сума:</b> ${r.sum} грн</p>
    `;

  } catch(e) {
    alert("Помилка звіту");
    console.error(e);
  }
}
</script>

</body>
</html>
