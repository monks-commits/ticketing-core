<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>КГ-13</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h1>Форма КГ-13 (щоденний звіт касира)</h1>

<div style="margin-bottom:15px;">
  <button onclick="history.back()">← Назад</button>

  Дата:
  <input type="date" id="day">

  Касир:
  <input type="text" id="cashier" value="cash">

  <button onclick="generate()">Сформувати</button>
  <button onclick="window.print()">Друк</button>
</div>

<hr>

<div>
  <p><b>Дата:</b> <span id="r-day">—</span></p>
  <p><b>Касир:</b> <span id="r-cashier">—</span></p>
  <br>
  <p><b>Кількість чеків:</b> <span id="r-count">0</span></p>
  <p><b>Сума:</b> <span id="r-sum">0</span> грн</p>
</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

function params() {
  const p = new URLSearchParams(location.search);
  return {
    day: p.get("day"),
    cashier: p.get("cashier")
  };
}

function generate() {
  const d = document.getElementById("day").value;
  const c = document.getElementById("cashier").value.trim();

  if (!d || !c) {
    alert("Вкажіть дату та касира");
    return;
  }

  location.href = `kg13.html?day=${d}&cashier=${encodeURIComponent(c)}`;
}

async function load() {
  const { day, cashier } = params();
  if (!day || !cashier) return;

  document.getElementById("day").value = day;
  document.getElementById("cashier").value = cashier;

  document.getElementById("r-day").textContent = day;
  document.getElementById("r-cashier").textContent = cashier;

  const start = day + "T00:00:00";
  const end = day + "T23:59:59";

  let count = 0;
  let sum = 0;

  try {
    // =========================
    // 1. CASH_OPS (основной источник)
    // =========================
    const resCash = await fetch(
      `${SUPABASE_URL}/rest/v1/cash_ops?created_at=gte.${start}&created_at=lte.${end}&payload->>type=eq.sale`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    const cashOps = await resCash.json();

    if (Array.isArray(cashOps) && cashOps.length) {
      count = cashOps.length;

      for (const op of cashOps) {
        const p = op.payload || {};
        sum += Number(p.amount || 0);
      }
    }

    // =========================
    // 2. FALLBACK → ORDERS
    // =========================
    if (count === 0) {
      const resOrders = await fetch(
        `${SUPABASE_URL}/rest/v1/orders?created_at=gte.${start}&created_at=lte.${end}`,
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        }
      );

      const orders = await resOrders.json();

      if (Array.isArray(orders)) {
        count = orders.length;

        for (const o of orders) {
          sum += Number(o.total || 0);
        }
      }
    }

    document.getElementById("r-count").textContent = count;
    document.getElementById("r-sum").textContent = sum;

  } catch (e) {
    console.error(e);
    alert("Помилка завантаження звіту");
  }
}

load();
</script>

</body>
</html>
