<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>КГ-13</title>
</head>

<body style="font-family:Arial;padding:20px;">

<h2>КГ-13 (щоденний звіт касира)</h2>

<button onclick="history.back()">← Назад</button>

Дата:
<input type="date" id="day">

Касир:
<input type="text" id="cashier" value="cash">

<button onclick="run()">Сформувати</button>
<button onclick="window.print()">Друк</button>

<hr>

<div id="out"></div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

async function run() {

  const day = document.getElementById("day").value;

  if (!day) {
    alert("Вкажіть дату");
    return;
  }

  try {

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?select=price,created_at`,
      {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        }
      }
    );

    if (!res.ok) {
      const t = await res.text();
      console.error(t);
      alert("Помилка запиту");
      return;
    }

    const data = await res.json();

    let count = 0;
    let sum = 0;

    for (const t of data) {

      if (!t.created_at) continue;

      const d = t.created_at.slice(0, 10);

      if (d === day) {
        count++;
        sum += Number(t.price || 0);
      }
    }

    document.getElementById("out").innerHTML = `
      <p><b>Дата:</b> ${day}</p>
      <p><b>Кількість:</b> ${count}</p>
      <p><b>Сума:</b> ${sum} грн</p>
    `;

  } catch (e) {
    console.error(e);
    alert("Помилка звіту");
  }
}
</script>

</body>
</html>
