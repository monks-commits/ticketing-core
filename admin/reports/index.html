<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Звіти — білетний відділ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">



<style>
.page-wrap{
  padding:20px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}
h1{margin-bottom:10px}
h3{margin:0 0 10px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.report{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:14px;
  background:#f9fafb;
}
.report h4{
  margin:0 0 6px;
}
.report p{
  font-size:13px;
  color:#6b7280;
  margin:0 0 10px;
}
.report button{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:#111827;
  color:#fff;
}
.report button.secondary{
  background:#e5e7eb;
  color:#111827;
}
.badge{
  display:inline-block;
  font-size:12px;
  padding:3px 8px;
  border-radius:999px;
  background:#e5e7eb;
  margin-bottom:6px;
}
.note{
  font-size:13px;
  color:#6b7280;
}
</style>
</head>

<body>

<div id="admin-header"></div>


  <main class="page-wrap">
  <h1>📊 Звіти</h1>

  <div class="card">
    <h3>Каса</h3>

    <div class="grid">

      <div class="report">
        <span class="badge">звіт</span>
        <h4>КГ-13 (щоденний)</h4>
        <p>Звіт касира за день</p>
        <button onclick="location.href='kg13.html'">Відкрити</button>
      </div>

      <div class="report">
        <span class="badge">звіт</span>
        <h4>КГ-10 (по сеансу)</h4>
        <p>Кількість і сума по сеансу</p>
        <button onclick="location.href='kg10.html'">Відкрити</button>
      </div>

    </div>
  </div>

</main>


</script>

</body>
</html>
