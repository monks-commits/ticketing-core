<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>КГ-10 — Звіт по сеансу</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#061a3a;
  --card:#1d2d47;
  --card-2:#223552;
  --text:#ffffff;
  --muted:#b8c4d6;
  --line:rgba(255,255,255,.10);

  --primary:#4c86f7;
  --primary-hover:#3f78e6;

  --success:#2ecc71;
  --success-hover:#28b864;

  --field:#10233f;
  --field-border:rgba(255,255,255,.12);

  --shadow:0 18px 40px rgba(0,0,0,.22);
  --radius-xl:24px;
  --radius-lg:18px;
  --radius-md:14px;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.page-wrap{
  width:min(1100px, calc(100% - 48px));
  margin:0 auto;
  padding:48px 0 56px;
}

.topbar{
  margin-bottom:28px;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#111827;
  font-size:16px;
  cursor:pointer;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 8px 20px rgba(0,0,0,.16);
}

.hero{
  margin-bottom:28px;
}

.hero-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}

.hero h1{
  margin:0 0 10px;
  font-size:52px;
  line-height:1.05;
  font-weight:800;
}

.hero p{
  margin:0;
  color:var(--muted);
  font-size:18px;
  line-height:1.45;
  max-width:760px;
}

.venue-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:40px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid var(--line);
  font-size:14px;
  font-weight:700;
  color:#fff;
  white-space:nowrap;
}

.card{
  background:var(--card);
  border-radius:var(--radius-xl);
  padding:28px 24px;
  box-shadow:var(--shadow);
}

.card h2{
  margin:0 0 10px;
  font-size:24px;
}

.card p{
  margin:0;
  color:var(--muted);
  line-height:1.45;
}

.row{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  align-items:end;
  margin-top:22px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:220px;
}

.field--grow{
  flex:1 1 420px;
}

.field label{
  font-size:13px;
  color:var(--muted);
}

select,input{
  width:100%;
  border:1px solid var(--field-border);
  background:var(--field);
  color:#fff;
  border-radius:14px;
  padding:12px;
  outline:none;
  font:inherit;
}

select:focus,
input:focus{
  border-color:rgba(76,134,247,.6);
  box-shadow:0 0 0 3px rgba(76,134,247,.16);
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:22px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:140px;
  min-height:46px;
  padding:0 18px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.15s ease;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:var(--primary);
  color:#fff;
}

.btn-primary:hover{
  background:var(--primary-hover);
}

.btn-success{
  background:var(--success);
  color:#08111f;
}

.btn-success:hover{
  background:var(--success-hover);
}

.result{
  margin-top:26px;
  background:var(--card-2);
  border:1px solid var(--line);
  border-radius:20px;
  padding:22px;
  min-height:160px;
}

.result-empty{
  color:var(--muted);
}

.result-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:16px;
}

.metric{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:18px;
}

.metric-label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

.metric-value{
  font-size:28px;
  font-weight:800;
  word-break:break-word;
}

.meta{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:14px;
}

.meta-item{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:16px;
}

.meta-label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

.meta-value{
  font-size:16px;
  font-weight:700;
  line-height:1.4;
  word-break:break-word;
}

@media print{
  body{
    background:#fff;
    color:#000;
  }

  .topbar,
  .actions,
  .venue-chip{
    display:none;
  }

  .card,
  .result,
  .metric,
  .meta-item{
    background:#fff !important;
    color:#000 !important;
    box-shadow:none !important;
    border:1px solid #ddd !important;
  }

  select,input{
    color:#000;
    background:#fff;
    border:1px solid #ccc;
  }
}

@media (max-width:768px){
  .page-wrap{
    width:min(100% - 24px, 1100px);
    padding:24px 0 32px;
  }

  .hero h1{
    font-size:38px;
  }

  .hero p{
    font-size:16px;
  }

  .card{
    padding:20px 16px;
  }

  .field,
  .field--grow{
    min-width:100%;
    flex:1 1 100%;
  }

  .btn{
    width:100%;
  }

  .result-grid,
  .meta{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="page-wrap">

  <div class="topbar">
    <a id="backLink" class="back-btn" href="./index.html">← Назад</a>
  </div>

  <section class="hero">
    <div class="hero-top">
      <div>
        <h1>📗 КГ-10</h1>
        <p>Звіт по окремому сеансу: кількість проданих квитків і загальна сума.</p>
      </div>
      <div id="venueChip" class="venue-chip">Майданчик: поточний контур</div>
    </div>
  </section>

  <section class="card">
    <h2>Параметри звіту</h2>
    <p>Оберіть сеанс зі списку та сформуйте звіт.</p>

    <div class="row">
      <div class="field field--grow">
        <label for="seance">Сеанс</label>
        <select id="seance">
          <option value="">Завантаження…</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="run()">Сформувати</button>
      <button class="btn btn-success" onclick="window.print()">Друк</button>
    </div>

    <div id="out" class="result">
      <div class="result-empty">
        Звіт ще не сформовано.
      </div>
    </div>
  </section>

</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

const params = new URLSearchParams(location.search);

const venueCode =
  params.get("venue") ||
  params.get("venue_code") ||
  params.get("site") ||
  "";

const venueLabel =
  params.get("venue_label") ||
  params.get("label") ||
  (venueCode ? venueCode : "поточний контур");

let seancesMap = new Map();

function withCurrentContext(target){
  const url = new URL(target, location.href);

  if (venueCode) url.searchParams.set("venue", venueCode);
  if (venueLabel) url.searchParams.set("venue_label", venueLabel);

  return url.toString();
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function isArchivedValue(value){
  return value === true || value === 1 || value === "1" || value === "true";
}

function formatSeanceLabel(s){
  const parts = [];

  if (s.title) parts.push(s.title);

  const dt = [s.date, s.time].filter(Boolean).join(" ");
  if (dt) parts.push(dt);

  parts.push(`#${s.id}`);

  return parts.join(" — ");
}

function formatMoney(sum){
  return new Intl.NumberFormat("uk-UA").format(sum) + " грн";
}

async function loadSeances() {
  const sel = document.getElementById("seance");
  sel.innerHTML = `<option value="">Завантаження…</option>`;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/seances?select=id,title,date,time,archived&order=date.asc.nullslast,time.asc.nullslast,created_at.asc.nullslast`,
      {
        headers:{
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    if (!res.ok) {
      console.error(await res.text());
      sel.innerHTML = `<option value="">Помилка завантаження</option>`;
      return;
    }

    const rows = await res.json();
    const activeRows = Array.isArray(rows)
      ? rows.filter(s => !isArchivedValue(s.archived))
      : [];

    seancesMap = new Map(activeRows.map(s => [String(s.id), s]));

    sel.innerHTML = `<option value="">Оберіть сеанс...</option>`;

    if (!activeRows.length) {
      sel.innerHTML = `<option value="">Немає доступних сеансів</option>`;
      return;
    }

    activeRows.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = formatSeanceLabel(s);
      sel.appendChild(opt);
    });

    const seanceFromUrl = params.get("seance_id") || params.get("seance");
    if (seanceFromUrl && seancesMap.has(String(seanceFromUrl))) {
      sel.value = String(seanceFromUrl);
    }

  } catch (e) {
    console.error(e);
    sel.innerHTML = `<option value="">Помилка завантаження</option>`;
  }
}

async function run() {
  const seance = document.getElementById("seance").value;

  if (!seance) {
    alert("Оберіть сеанс");
    return;
  }

  const out = document.getElementById("out");
  out.innerHTML = `<div class="result-empty">Формування звіту…</div>`;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?select=price,seance_id,status&seance_id=eq.${encodeURIComponent(seance)}`,
      {
        headers:{
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    if (!res.ok) {
      console.error(await res.text());
      out.innerHTML = `<div class="result-empty">Помилка запиту до таблиці tickets.</div>`;
      return;
    }

    const data = await res.json();

    const filtered = Array.isArray(data)
      ? data.filter(t => {
          const st = String(t.status || "").toLowerCase().trim();
          if (!st) return true;
          if (st === "cancelled") return false;
          if (st === "canceled") return false;
          if (st === "refunded") return false;
          if (st === "void") return false;
          return true;
        })
      : [];

    const count = filtered.length;
    const sum = filtered.reduce((acc, t) => acc + Number(t.price || 0), 0);

    const meta = seancesMap.get(String(seance)) || {};
    const seanceTitle = meta.title || "—";
    const seanceDate = meta.date || "—";
    const seanceTime = meta.time || "—";

    out.innerHTML = `
      <div class="result-grid">
        <div class="metric">
          <div class="metric-label">Сеанс ID</div>
          <div class="metric-value">${escapeHtml(seance)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Кількість квитків</div>
          <div class="metric-value">${count}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Загальна сума</div>
          <div class="metric-value">${escapeHtml(formatMoney(sum))}</div>
        </div>
      </div>

      <div class="meta">
        <div class="meta-item">
          <div class="meta-label">Назва</div>
          <div class="meta-value">${escapeHtml(seanceTitle)}</div>
        </div>

        <div class="meta-item">
          <div class="meta-label">Майданчик</div>
          <div class="meta-value">${escapeHtml(venueLabel)}</div>
        </div>

        <div class="meta-item">
          <div class="meta-label">Дата</div>
          <div class="meta-value">${escapeHtml(seanceDate)}</div>
        </div>

        <div class="meta-item">
          <div class="meta-label">Час</div>
          <div class="meta-value">${escapeHtml(seanceTime)}</div>
        </div>
      </div>
    `;
  } catch(e) {
    console.error(e);
    out.innerHTML = `<div class="result-empty">Помилка формування звіту.</div>`;
  }
}

(function initPage(){
  const chip = document.getElementById("venueChip");
  if (chip) {
    chip.textContent = `Майданчик: ${venueLabel}`;
  }

  const back = document.getElementById("backLink");
  if (back) {
    back.href = withCurrentContext("./index.html");
  }

  loadSeances();
})();
</script>

</body>
</html>
