<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>КГ-10</title>
<style>
body{font-family:Arial;padding:20px}
select,input,button{margin:6px 0;padding:6px}
</style>
</head>

<body>

<h2>КГ-10 (звіт по сеансу)</h2>

<button onclick="history.back()">← Назад</button>

<br><br>

Сеанс:
<select id="seance"></select>

<br>

<button onclick="run()">Сформувати</button>
<button onclick="window.print()">Друк</button>

<hr>

<div id="out"></div>

<script>

const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";

async function loadSeances() {

  const sel = document.getElementById("seance");

  sel.innerHTML = `<option value="">Оберіть сеанс...</option>`;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?select=id,archived&archived=eq.false`,
    {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const rows = await res.json();

  rows.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.id;
    sel.appendChild(opt);
  });
}

async function run() {

  const seance = document.getElementById("seance").value;

  if (!seance) {
    alert("Оберіть сеанс");
    return;
  }

  try {

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?select=price,seance_id&seance_id=eq.${encodeURIComponent(seance)}`,
      {
        headers:{
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    if (!res.ok) {
      alert("Помилка запиту");
      return;
    }

    const data = await res.json();

    let count = data.length;
    let sum = 0;

    data.forEach(t => {
      sum += Number(t.price || 0);
    });

    document.getElementById("out").innerHTML = `
      <p><b>Сеанс:</b> ${seance}</p>
      <p><b>Кількість квитків:</b> ${count}</p>
      <p><b>Сума:</b> ${sum} грн</p>
    `;

  } catch(e) {
    console.error(e);
    alert("Помилка");
  }
}

loadSeances();

</script>

</body>
</html>
