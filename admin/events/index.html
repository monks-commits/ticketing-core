<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Події</title>
</head>

<body style="font-family:Arial;padding:20px;">

<h2>Сеанси</h2>

<button onclick="location.href='index.html'">← Назад</button>
<button onclick="create()">+ Новий сеанс</button>

<hr>

<div id="list"></div>

<script>

const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "ВСТАВЬ_КЛЮЧ";

async function load() {

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances?select=*`,
    {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await res.json();

  const el = document.getElementById("list");

  el.innerHTML = "";

  data.forEach(s => {

    const row = document.createElement("div");

    row.style.marginBottom = "10px";

    row.innerHTML = `
      <b>${s.title || s.id}</b>
      (${s.date} ${s.time})

      <button onclick="toCash('${s.id}')">В касу</button>
      <button onclick="edit('${s.id}')">Редагувати</button>
    `;

    el.appendChild(row);
  });
}

function toCash(id) {
  location.href = `/ticketing-core/hybrid/hall-cash.html?seance=${id}`;
}

function edit(id) {
  location.href = `seance-editor.html?id=${id}`;
}

function create() {
  location.href = "seance-editor.html";
}

load();

</script>

</body>
</html>
