<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Каса</title>

<link rel="stylesheet" href="../styles.css"/>

<script type="module">
import QRCode from "https://esm.sh/qrcode@1.5.4";
window.QRCode = QRCode;
</script>

<style>
.hall-layout{display:flex;gap:24px}
.hall-left{flex:1}
.hall-sidebar{width:320px}

.row-line{display:flex;gap:8px;margin-bottom:6px}
.row-label{width:24px;text-align:right;font-size:12px;color:#666}
.seats-row{display:flex;gap:4px}

.seat{
  width:26px;height:26px;border:1px solid #ccc;border-radius:6px;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:#fff;
}
.seat--selected{background:#2563eb;color:#fff}
.seat--sold{background:#9ca3af;color:#fff;cursor:not-allowed}
.seat--blocked{background:#111827;color:#fff;cursor:not-allowed}
</style>
</head>

<body>

<main class="main">
<div class="container">

<h1>Каса</h1>

<div class="hall-layout">

<!-- ЗАЛ -->
<div class="hall-left">
  <div id="hall-root"></div>
</div>

<!-- КОРЗИНА -->
<div class="hall-sidebar">

<h3>Кошик</h3>

<p id="summary-places">—</p>
<p id="summary-amount">0 грн</p>

<button id="btn-sell">Продати</button>
<button id="btn-sync">SYNC</button>

</div>
</div>
</div>
</main>

<script>
const qs = new URLSearchParams(location.search);
const SEANCE_ID = qs.get("seance");

const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_KEY = "ВАШ_КЛЮЧ";

const takenSeatsOnline = new Set();
const selected = new Map();
const seatButtons = new Map();

/* ===== SAFE LOAD SOLD ===== */
async function loadTakenSeatsOnline(){

  if(!SEANCE_ID) return;

  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?seance_id=eq.${SEANCE_ID}&select=seat_label`,
      {
        headers:{
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      }
    );

    const rows = await res.json();

    if(!Array.isArray(rows)){
      console.warn("tickets error", rows);
      return;
    }

    takenSeatsOnline.clear();

    rows.forEach(r=>{
      if(r.seat_label){
        takenSeatsOnline.add(r.seat_label);
      }
    });

  }catch(e){
    console.warn("offline mode");
  }
}

/* ===== SEAT ===== */
function seatKey(r,s){
  return `P${r}-M${s}`;
}

function makeSeat(r,s){

  const key = seatKey(r,s);

  const btn = document.createElement("button");
  btn.className = "seat";
  btn.textContent = s;

  if(takenSeatsOnline.has(key)){
    btn.classList.add("seat--sold");
    btn.disabled = true;
  }

  btn.onclick = ()=>{

    if(btn.classList.contains("seat--selected")){
      btn.classList.remove("seat--selected");
      selected.delete(key);
    }else{
      btn.classList.add("seat--selected");
      selected.set(key, {price:100});
    }

    updateSummary();
  };

  seatButtons.set(key, btn);

  return btn;
}

/* ===== RENDER ===== */
function renderHall(){

  const root = document.getElementById("hall-root");
  root.innerHTML = "";

  for(let r=1;r<=10;r++){

    const row = document.createElement("div");
    row.className = "row-line";

    const label = document.createElement("div");
    label.className = "row-label";
    label.textContent = r;

    const seats = document.createElement("div");
    seats.className = "seats-row";

    for(let s=1;s<=12;s++){
      seats.appendChild(makeSeat(r,s));
    }

    row.appendChild(label);
    row.appendChild(seats);
    root.appendChild(row);
  }
}

/* ===== SUMMARY ===== */
function updateSummary(){

  const keys = Array.from(selected.keys());

  if(!keys.length){
    document.getElementById("summary-places").textContent = "немає";
    document.getElementById("summary-amount").textContent = "0 грн";
    return;
  }

  document.getElementById("summary-places").textContent = keys.join(", ");
  document.getElementById("summary-amount").textContent =
    (keys.length * 100) + " грн";
}

/* ===== SELL ===== */
document.getElementById("btn-sell").onclick = async ()=>{

  const keys = Array.from(selected.keys());
  if(!keys.length) return;

  const tickets = keys.map(k=>({
    seat_label:k,
    order_id:"CASH-"+Date.now()
  }));

  await printTickets(tickets);
};

/* ===== PRINT ===== */
async function printTickets(tickets){

  let html = "";

  for(const t of tickets){

    const qr = await QRCode.toDataURL(t.seat_label);

    html += `
      <div>
        ${t.seat_label}<br/>
        <img src="${qr}" width="120"/>
      </div>
    `;
  }

  const w = window.open("");
  w.document.write(html);
  w.print();
}

/* ===== INIT ===== */
(async ()=>{

  await loadTakenSeatsOnline();
  renderHall();

})();
</script>

</body>
</html>
